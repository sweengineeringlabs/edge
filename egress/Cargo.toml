[workspace]
resolver = "2"
members = ["main", "http", "grpc", "grpc-retry", "grpc-breaker",
           "grpc-auth-mtls", "grpc-auth-bearer", "grpc-authz",
           "database", "file", "notification", "payment",
           "auth", "retry", "rate", "breaker", "cache", "cassette", "tls"]

[workspace.package]
version      = "0.1.0"
edition      = "2021"
license      = "MIT"
rust-version = "1.75"
authors      = ["SWE Engineering Labs"]
repository   = "https://github.com/sweengineeringlabs/edge"

[workspace.dependencies]
serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0"
serde_yaml  = "0.9"
thiserror   = "2"
async-trait = "0.1"
futures     = "0.3"
tokio       = { version = "1.0", features = ["rt", "sync", "fs", "io-util"] }
parking_lot = "0.12"
walkdir     = "2"
uuid        = { version = "1.0", features = ["v4"] }
chrono      = { version = "0.4", features = ["serde"] }
tracing     = { version = "0.1", default-features = false }
mime_guess  = "2"
base64      = "0.22"
toml        = "0.8"
anyhow      = "1"
swe_justobserv_context = { git = "ssh://git@github.com/sweengineeringlabs/justobserv.git", tag = "v0.2.1" }
swe-observ-processes   = { package = "swe_justobserv_processes", git = "ssh://git@github.com/sweengineeringlabs/justobserv.git", tag = "v0.2.1" }
reqwest     = { version = "0.12", features = ["json", "stream", "multipart", "native-tls", "rustls-tls"], default-features = false }

# reqwest middleware stack
reqwest-middleware = { version = "0.3", features = ["json", "multipart"] }
reqwest-retry      = "0.6"
http               = "1"
http-cache-reqwest = { version = "0.14", features = ["manager-moka"] }
moka               = { version = "0.12", features = ["future"] }

# Auth / TLS crypto
secrecy          = "0.10"
sha2             = "0.10"
hmac             = "0.12"
md-5             = "0.10"
hex              = "0.4"
time             = { version = "0.3", features = ["formatting", "macros"] }
percent-encoding = "2.3"

# Optional
sqlx     = { version = "0.8", default-features = false }
wiremock = "0.6"

# Workspace-internal domain crates
swe-edge-egress-http         = { path = "http" }
swe-edge-egress-grpc         = { path = "grpc" }
swe-edge-egress-database     = { path = "database" }
swe-edge-egress-file         = { path = "file" }
swe-edge-egress-notification = { path = "notification" }
swe-edge-egress-payment      = { path = "payment" }

# Workspace-internal middleware crates
swe-edge-egress-auth         = { path = "auth" }
swe-edge-egress-retry        = { path = "retry" }
swe-edge-egress-rate         = { path = "rate" }
swe-edge-egress-breaker      = { path = "breaker" }
swe-edge-egress-cache        = { path = "cache" }
swe-edge-egress-cassette     = { path = "cassette" }
swe-edge-egress-tls          = { path = "tls" }

