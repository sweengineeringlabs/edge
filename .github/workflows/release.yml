name: Release

# Fire on every `v<semver>` tag push and publish a GitHub Release
# with auto-generated notes. Edge is a pure library repo — no
# binaries are built, so consumers still compile from source. The
# release gives downstream repos (llmboot, justobserv, swe-messaging)
# a stable, reproducible handle: `tag = "v0.2.0"` in their Cargo.toml
# instead of `branch = "main"`.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # Hand trigger if the push-event run fails mid-flight.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (must already exist)."
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          # `--generate-notes` walks history since the previous tag.
          fetch-depth: 0

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
